title: Valence
description: A private, controlled, curated AI space.
url: https://helixailabs.github.io
baseurl: /Valence
# Keep the original date-based post URLs even though posts now carry a category —
# the default permalink would otherwise inject /:categories/ and break existing links.
permalink: /:year/:month/:day/:title:output_ext
defaults:
  - scope: { path: "" }
    values: { layout: default }
  - scope: { path: "", type: posts }
    values: { layout: post, category: release }
