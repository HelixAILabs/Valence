---
layout: default
---
<p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
<h1>{{ page.title }}</h1>
<article>
{{ content }}
</article>
{% if page.category == 'news' %}
<p style="margin-top:2.5rem"><a href="{{ '/news/' | relative_url }}">&larr; All news</a></p>
{% else %}
<p style="margin-top:2.5rem"><a href="{{ '/updates/' | relative_url }}">&larr; All updates</a></p>
{% endif %}
